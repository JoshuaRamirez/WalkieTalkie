name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Byte-compile sources
        run: python -m compileall security-foundations

      - name: Lint
        run: ruff check security-foundations

      - name: Unit tests
        run: |
          set -euo pipefail
          # Each package/example is its own import root (some subdirs have no
          # __init__.py and rely on per-test sys.path), so discover per-root
          # rather than once from the repo top. Any failing suite fails the job.
          roots=(
            security-foundations/envelope
            security-foundations/mesh
            security-foundations/integrations/mcp
            security-foundations/integrations/mcp/bridge
            security-foundations/integrations/mcp/federation
            security-foundations/integrations/mcp/workspace
          )
          for r in "${roots[@]}"; do
            echo "::group::unittest ${r}"
            python -m unittest discover -s "${r}" -t "${r}"
            echo "::endgroup::"
          done
